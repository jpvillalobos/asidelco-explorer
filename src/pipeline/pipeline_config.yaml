version: 1

pipeline:
  name: asidelco-explorer
  description: End-to-end ingestion, crawling, transformation, enhancement, and loading
  workspace_root: workspaces
  default_log_level: INFO  # ADD THIS - default for all steps

  stages:
    - id: ingest
      title: Ingest
      description: Load and normalize input CSV/Excel file
      steps:
        - name: normalize_csv
          title: Normalize Input File
          log_level: INFO  # ADD THIS to each step
          args:
            input_file: data/input/Ene-Mar25.xlsx
            output_file: data/output/normalized.csv

    - id: crawl
      title: Crawl
      description: Crawl CFIA website for project and professional data
      steps:
        - name: crawl_projects
          title: Crawl Projects
          log_level: INFO
          args:
            input_file: data/output/normalized.csv
            base_url: https://servicios.cfia.or.cr
            project_url: https://servicios.cfia.or.cr/ConsultaProyecto/
            output_dir: data/output/projects/html
            rate_limit: 0.5
            max_retries: 3
            timeout: 30

        - name: crawl_professionals
          title: Crawl Professionals
          log_level: INFO
          args:
            input_dir: data/output/projects/html
            base_url: https://servicios.cfia.or.cr
            directory_url: https://servicios.cfia.or.cr/ListadoMiembros/Miembros/
            max_members: 1000000
            output_dir: data/output/professionals
            rate_limit: 0.5
            max_retries: 3
            timeout: 30

    - id: transform
      title: Transform
      description: Parse HTML to JSON and merge data sources
      steps:
        - name: parse_html
          title: Parse Project HTML to JSON
          log_level: INFO
          args:
            input_dir: data/output/projects/html
            output_dir: data/output/projects/json
            save_json: true

        - name: merge_data
          title: Merge CSV + Projects + Professionals
          log_level: INFO
          args:
            csv_file: data/output/normalized.csv
            projects_json_dir: data/output/projects/json
            professionals_json_dir: data/output/professionals/json
            output_file: data/output/merged.json

        - name: flatten_normalize
          title: Flatten and Normalize Data
          log_level: INFO
          args:
            input_file: data/output/merged.json
            output_file: data/output/flattened.json
            normalize_text: true
            normalize_dates: true

    - id: enhance
      title: Enhance
      description: Add geocoding, AI summaries, and validate data
      steps:
        - name: add_geocoding
          title: Add Geocoding (Lat/Lon)
          log_level: INFO
          args:
            input_file: data/output/flattened.json
            output_file: data/output/geocoded.json
            address_field: project_direccion_exacta
            province_field: project_provincia
            canton_field: project_canton
            district_field: project_distrito
            country: Costa Rica
            rate_limit: 1.0

        - name: generate_summaries
          title: Generate Project Search Summaries
          log_level: INFO
          args:
            input_file: data/output/geocoded.json
            output_file: data/output/summarized.json
            summary_field: resumen
            model: gpt-4o-mini
            max_completion_tokens: 300
            temperature: 0.3
            skip_existing: false
            use_ai: false

        - name: validate_enrich
          title: Validate and Final Enrichment
          log_level: INFO
          args:
            input_file: data/output/summarized.json
            output_file: data/output/enriched.json
            validation_rules: null

        - name: generate_embeddings
          title: Generate Embeddings
          log_level: INFO
          args:
            input_file: data/output/enriched.json
            output_file: data/output/enriched_with_embeddings.json
            text_field: resumen
            embedding_field: embedding
            provider: openai
            model: text-embedding-3-small
            api_key: null
            batch_size: 32
            force_regenerate: true

        - name: prepare_for_indexing
          title: Prepare Search Index Documents
          log_level: INFO
          args:
            input_file: data/output/enriched_with_embeddings.json
            output_file: data/output/search_ready.json
            summary_field: resumen
            embedding_field: embedding
            expected_embedding_dim: 1536
            chunk_size: 16777216
            progress_interval: 10000

    - id: load
      title: Load
      description: Load data to OpenSearch, Neo4j, and Excel
      steps:
        - name: load_excel_template
          title: Load to MS Excel Template
          log_level: INFO
          args:
            input_file: data/output/enriched_with_embeddings.json
            template_file: data/input/template.xlsx
            output_file: data/output/final_report.xlsx
            sheet_name: null

        - name: load_opensearch
          title: Load to OpenSearch
          log_level: INFO
          args:
            input_file: data/output/search_ready.json
            host: localhost
            port: 9200
            index_name: asidelco-explorer
            auth: null
            use_ssl: false
            verify_certs: false
            batch_size: 500
            mappings: null
            settings: null

        - name: load_neo4j
          title: Load to Neo4j
          log_level: INFO
          args:
            input_file: data/output/search_ready.json
            uri: bolt://localhost:7687
            auth: null
